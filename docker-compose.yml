services:
  # --- FastAPI REST API ---
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: bash -c "python scripts/seed_feedback.py && uvicorn api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    working_dir: /app

  # --- Streamlit Dashboard ---
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    working_dir: /app

  # --- Airflow Init (DB + admin user) ---
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    user: "0:0"
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/dags
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      PYTHONPATH: /opt/airflow/project
    volumes: &airflow-vols
      - .:/opt/airflow/project
      - airflow-db:/opt/airflow
      - ./data:/opt/airflow/project/data
    entrypoint: /bin/bash
    command: >
      -c "
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true &&
        chmod -R 777 /opt/airflow/project/data &&
        chmod -R 777 /opt/airflow
      "

  # --- Airflow Webserver ---
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    environment: *airflow-env
    volumes: *airflow-vols
    command: airflow webserver --port 8080
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # --- Airflow Scheduler ---
  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    environment: *airflow-env
    volumes: *airflow-vols
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  airflow-db:
